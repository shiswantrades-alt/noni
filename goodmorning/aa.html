<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Surprise</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Georgia', serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e8, #ffeaf3);
    }

    .container {
      perspective: 1500px;
    }

    .heart-box {
      width: 300px;
      height: 300px;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    /* HEART */
    .heart {
      position: absolute;
      width: 170px;
      height: 170px;
      top: 65px;
      left: 65px;
      background: linear-gradient(135deg, #ff4d6d, #ff9db5);
      transform: rotate(-45deg);
      box-shadow: 0 15px 35px rgba(255, 77, 109, 0.35);
      transition: transform 1s ease;
      z-index: 1;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      background: linear-gradient(135deg, #ff4d6d, #ff9db5);
      border-radius: 50%;
    }

    .heart::before {
      top: -85px;
      left: 0;
    }

    .heart::after {
      left: 85px;
      top: 0;
    }

    /* OPEN HEART */
    .open .heart {
      transform: rotate(-45deg) rotateX(160deg) translateY(-60px);
    }

    /* INSIDE IMAGE */
    .inside {
      position: absolute;
      width: 240px;
      height: 240px;
      top: 30px;
      left: 30px;
      transform: rotate(-45deg) translateZ(-50px);
      opacity: 0;
      transition: all 1s ease 0.6s;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    .inside img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 22px;
      transform: rotate(45deg) translateZ(120px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.35);
    }

    .open .inside {
      opacity: 1;
      transform: rotate(-45deg) translateZ(80px);
    }

    /* SOFT GLOW */
    .heart-box::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      top: 20px;
      left: 20px;
      background: radial-gradient(circle, rgba(255,182,193,0.45), transparent);
      filter: blur(30px);
      z-index: -1;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="heart-box" onclick="openBox(this)">
    <div class="heart"></div>

    <div class="inside">
      <img src="286.jpg" alt="Surprise">
    </div>
  </div>
</div>

<script>
  function openBox(box) {
    box.classList.toggle("open");
  }
</script>

</body>
</html>
