<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Magical Butterfly Morning</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Dancing Script", "Parisienne", "Alex Brush", cursive;
    background: linear-gradient(#87ceeb, #e0f6ff);
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Butterfly base */
  .butterfly {
    position: absolute;
    width: 60px;
    height: 50px;
    cursor: pointer;
    animation: float 4s ease-in-out infinite;
  }

  .butterfly.small {
    width: 30px;
    height: 25px;
    pointer-events: none;
  }

  .wing {
    position: absolute;
    width: 50%;
    height: 100%;
    background: radial-gradient(circle at 30% 30%, #9ddcff, #2b7cff);
    border-radius: 100% 0 100% 0;
    animation: flap 0.6s ease-in-out infinite;
  }

  .wing.right {
    right: 0;
    transform-origin: left center;
    border-radius: 0 100% 0 100%;
  }

  .body {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: #333;
    border-radius: 10px;
  }

  @keyframes flap {
    0%, 100% { transform: rotateY(0deg); }
    50% { transform: rotateY(60deg); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* Flying across screen */
  .fly-across {
    animation: flyAcross 6s linear forwards;
  }

  @keyframes flyAcross {
    0% { left: -80px; top: 40%; }
    100% { left: 110%; top: 30%; }
  }

  /* Text trail */
  .message {
    position: absolute;
    top: 45%;
    left: 10%;
    font-size: clamp(28px, 5vw, 56px);
    color: #1b4fa1;
    white-space: nowrap;
    letter-spacing: 2px;
  }

  .message span {
    opacity: 0;
    animation: reveal 0.4s forwards;
  }

  @keyframes reveal {
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <!-- Main butterfly -->
  <div class="butterfly" id="mainButterfly" style="left:50%; top:50%;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body"></div>
  </div>
</div>

<script>
const main = document.getElementById("mainButterfly");
const scene = document.getElementById("scene");
let activated = false;

main.addEventListener("click", () => {
  if (activated) return;
  activated = true;

  // Spawn small butterflies
  for (let i = 0; i < 12; i++) {
    const b = document.createElement("div");
    b.className = "butterfly small";
    b.innerHTML = `
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="body"></div>
    `;
    b.style.left = Math.random() * 100 + "%";
    b.style.top = Math.random() * 100 + "%";
    b.style.animation = `float ${2 + Math.random()*3}s ease-in-out infinite`;
    b.animate([
      { transform: "translate(0,0)" },
      { transform: `translate(${Math.random()*200-100}px, ${Math.random()*200-100}px)` }
    ], {
      duration: 4000 + Math.random()*3000,
      iterations: Infinity,
      direction: "alternate",
      easing: "ease-in-out"
    });
    scene.appendChild(b);
  }

  // After a moment, fly across and show message
  setTimeout(() => {
    main.classList.add("fly-across");

    const msg = document.createElement("div");
    msg.className = "message";
    const text = "GOOD MORNING NONI 🦋";
    text.split("").forEach((ch, i) => {
      const span = document.createElement("span");
      span.textContent = ch;
      span.style.animationDelay = (i * 0.15) + "s";
      msg.appendChild(span);
    });
    scene.appendChild(msg);
  }, 1200);
});
</script>
</body>
</html>
